<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Player Sequencial</title>
</head>
<body>
  <video id="player" width="640" height="360" controls autoplay>
    <source src="video1.mp4" type="https://cdn.vod.br1.jmvstream.com/vod/vod_20775/f/0l740gp5vm45wg4/h/4/playlist.m3u8?uf085lum5fbz=gr3iopaw27dh1eyh">
  </video>

  <script>
    const lista = ["video1.mp4", "https://cdn.vod.br1.jmvstream.com/vod/vod_20775/f/2qvxnoex044t2jm/h/4/playlist.m3u8?uf085lum5fbz=gr3iopaw27dh1eyh"]; // seus dois vídeos
    let indice = 0;
    const player = document.getElementById("player");

    player.addEventListener("ended", () => {
      indice++;
      if (indice < lista.length) {
        player.src = lista[indice];
        player.play();
      }
    });
  </script>
</body>
</html>
